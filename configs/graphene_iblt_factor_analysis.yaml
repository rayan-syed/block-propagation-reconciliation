output_dir: results/graphene_iblt_factor_analysis
trials: 50
seed: 42

protocols:
  - name: graphene
    cell_size: 12
    iblt_hashes: 3
    delta: 0.5
    max_search_a: 64

experiments:
  - name: iblt_factor_sweep
    mode: overlap
    group_by: iblt_factor
    block_size: 500
    mempool_size: 2500
    values: [1.0]
    iblt_factor: [4, 8, 12, 16, 24]
